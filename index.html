<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz cumpleaños Maritza</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    width:100vw; height:100vh;
    overflow:hidden;
    background: #0d0720;
    font-family: 'Fredoka One', cursive;
    position:relative;
  }

  .sky {
    position:fixed; inset:0;
    background: radial-gradient(ellipse at 20% 30%, #2d1160 0%, transparent 55%),
                radial-gradient(ellipse at 80% 70%, #0d2b5e 0%, transparent 55%),
                radial-gradient(ellipse at 50% 100%, #1a0533 0%, transparent 60%),
                #0d0720;
    pointer-events:none;
  }

  .moon {
    position:fixed;
    top:32px; right:80px;
    width:90px; height:90px;
    border-radius:50%;
    background: radial-gradient(circle at 35% 35%, #fff9c4, #f0c040);
    box-shadow: 0 0 40px 12px rgba(240,192,64,.35), 0 0 80px 30px rgba(240,192,64,.15);
    pointer-events:none;
  }
  .moon::before {
    content:'';
    position:absolute;
    width:18px; height:18px;
    border-radius:50%;
    background:rgba(200,160,20,.3);
    top:20px; left:52px;
    box-shadow:-24px 28px 0 8px rgba(200,160,20,.2), 10px 46px 0 5px rgba(200,160,20,.18);
  }

  .stars { position:fixed; inset:0; pointer-events:none; }
  .star {
    position:absolute; border-radius:50%; background:#fff;
    animation: twinkle ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100%{opacity:.15;transform:scale(.7);}
    50%    {opacity:1;  transform:scale(1.1);}
  }

  .rooftop {
    position:fixed; bottom:0; left:0; right:0;
    height:160px; pointer-events:none; z-index:2;
  }

  .cat-sil {
    position:fixed; bottom:0;
    pointer-events:none; z-index:3; opacity:.6;
    filter:drop-shadow(0 -4px 14px rgba(180,100,255,.35));
  }

  .paw {
    position:fixed; pointer-events:none; opacity:.1;
    animation: floatPaw ease-in-out infinite;
    z-index:1;
  }
  @keyframes floatPaw {
    0%,100%{transform:translateY(0) rotate(-5deg);}
    50%    {transform:translateY(-16px) rotate(5deg);}
  }

  .sprite {
    position:fixed;
    width:160px; height:160px;
    pointer-events:none; user-select:none;
    will-change:transform;
    object-fit:contain;
    filter:drop-shadow(0 8px 20px rgba(0,0,0,.6));
    z-index:10;
  }
</style>
</head>
<body>

<div class="moon"></div>

<!--
  🎵 MÚSICA DE FONDO
  Reemplaza "musica.mp3" con el nombre de tu archivo de audio.
  Formatos soportados: .mp3 .ogg .wav
-->
<audio id="bgMusic" src="musica.mp3" loop autoplay></audio>

<img class="sprite" id="s0" src="Chente.png"   alt="">
<img class="sprite" id="s1" src="wuero.png"    alt="">
<img class="sprite" id="s2" src="Estrella.png" alt="">
<img class="sprite" id="s3" src="Peke.png"     alt="">
<img class="sprite" id="s4" src="Remmy.png"    alt="">
<img class="sprite" id="s5" src="Sam.png"      alt="">

<script>
/* ── Música: los navegadores bloquean autoplay sin interacción,
      se inicia al primer click o tecla ── */
const music = document.getElementById('bgMusic');
function startMusic() {
  music.play().catch(() => {});
  window.removeEventListener('click', startMusic);
  window.removeEventListener('keydown', startMusic);
}
window.addEventListener('click', startMusic);
window.addEventListener('keydown', startMusic);

/* ── Estrellas ── */
const starsEl = document.getElementById('stars');
for (let i = 0; i < 130; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random() * 2.5 + .6;
  s.style.cssText = `
    width:${sz}px; height:${sz}px;
    top:${Math.random() * 72}%;
    left:${Math.random() * 100}%;
    animation-duration:${2 + Math.random() * 5}s;
    animation-delay:${Math.random() * 6}s;
  `;
  starsEl.appendChild(s);
}

/* ── Física con gravedad — rebote infinito ── */
const SIZE          = 160;
const GRAVITY       = 0.45;
const BOUNCE        = 0.78;      // energía conservada en rebote vertical
const BOUNCE_SIDE   = 0.85;      // energía conservada en paredes
const MIN_BOUNCE_VY = 20;         // velocidad mínima al rebotar en el suelo (nunca para)
const BOTTOM_MARGIN = 135;

const sprites = Array.from(document.querySelectorAll('.sprite'));

const state = sprites.map(() => ({
  x:  Math.random() * (window.innerWidth  - SIZE),
  y:  Math.random() * (window.innerHeight * .4),
  vx: (Math.random() - .5) * 6,
  vy: Math.random() * 3,
  rot:  Math.random() * 360,
  rotV: (Math.random() - .5) * 10.5,
  sx: 1, sy: 1,
}));

function tick() {
  const W     = window.innerWidth;
  const H     = window.innerHeight;
  const floor = H - BOTTOM_MARGIN - SIZE;

  state.forEach((p, i) => {
    p.vy  += GRAVITY;
    p.x   += p.vx;
    p.y   += p.vy;
    p.rot += p.rotV;

    /* recuperar squish suavemente */
    p.sx += (1 - p.sx) * .2;
    p.sy += (1 - p.sy) * .2;

    /* ── pared izquierda ── */
    if (p.x <= 0) {
      p.x  = 0;
      p.vx = Math.abs(p.vx) * BOUNCE_SIDE;
      p.sx = .72; p.sy = 1.28;
      p.rotV = (Math.random() * 4 + 2) * (Math.random() < .5 ? 1 : -1);
    }
    /* ── pared derecha ── */
    else if (p.x + SIZE >= W) {
      p.x  = W - SIZE;
      p.vx = -Math.abs(p.vx) * BOUNCE_SIDE;
      p.sx = .72; p.sy = 1.28;
      p.rotV = (Math.random() * 4 + 2) * (Math.random() < .5 ? 1 : -1);
    }

    /* ── techo ── */
    if (p.y <= 0) {
      p.y  = 0;
      p.vy = Math.abs(p.vy) * BOUNCE;
      p.sx = 1.28; p.sy = .72;
      p.rotV = (Math.random() * 4 + 2) * (Math.random() < .5 ? 1 : -1);
    }
    /* ── suelo ── */
    else if (p.y >= floor) {
      p.y  = floor;
      const rebote = Math.abs(p.vy) * BOUNCE;
      p.vy = -(rebote < MIN_BOUNCE_VY ? MIN_BOUNCE_VY : rebote);
      p.sx = 1.38; p.sy = .62;
      p.rotV = .75;
    }

    sprites[i].style.transform =
      `translate(${p.x}px,${p.y}px) rotate(${p.rot}deg) scale(${p.sx},${p.sy})`;
  });

  requestAnimationFrame(tick);
}

tick();
</script>
</body>
</html>
